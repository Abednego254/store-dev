# ---------- General ----------
server:
  port: 8082                 # port unayotumia ndani & nje ya container

# ---------- DataSource ----------
spring:
  datasource:
    url: jdbc:h2:mem:shopdb
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console

  # ---------- JPA / Hibernate ----------
  jpa:
    hibernate:
      ddl-auto: update        # linda schema; badilisha prod kama unataka
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# ---------- Actuator ----------
management:
  endpoints:
    web:
      exposure:
        include: "*"          # act‑enable /actuator/health, metrics n.k.